<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Sanofi App</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden; /* ❗ sayfa scroll yok */
  background:#070a12;
}

/* 📱 FULLSCREEN APP CONTAINER */
.app-container{
  width:100%;
  height:100vh; /* ❗ full ekran */
  display:flex;
  flex-direction:column;
  padding:10px;
  background:linear-gradient(145deg,#0f1626,#0b0f19);
  color:#fff;
}

/* HEADER */
.header{
  text-align:center;
  padding:6px 0;
  flex-shrink:0;
}
.header h1{font-size:16px}
.header p{font-size:11px;color:#38bdf8}

/* STATUS */
.live-status{
  display:flex;
  justify-content:space-between;
  font-size:11px;
  margin:4px 0;
  flex-shrink:0;
}

/* TAB */
.nav-tabs{
  display:flex;
  background:#0f172a;
  border-radius:10px;
  padding:3px;
  flex-shrink:0;
}
.tab-btn{
  flex:1;
  border:none;
  background:transparent;
  color:#64748b;
  font-size:12px;
  padding:6px;
}
.tab-btn.active{
  background:#38bdf8;
  color:#000;
  border-radius:8px;
}

/* CONTENT AREA */
.tab-content{
  display:none;
  flex:1;
  flex-direction:column;
  overflow:hidden; /* ❗ sayfa scroll yok */
}
.tab-content.active{
  display:flex;
}

/* CARDS */
.summary-card{
  background:rgba(255,255,255,0.04);
  padding:8px;
  border-radius:10px;
  margin-top:6px;
}

.label{font-size:11px;color:#94a3b8}
.value{font-size:18px;font-weight:bold}

/* PROGRESS */
.progress{
  height:6px;
  background:#1e293b;
  border-radius:5px;
  overflow:hidden;
  margin-top:6px;
}
.progress-fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#10b981,#38bdf8);
}

/* LIST (ONLY SCROLL AREA) */
.list{
  flex:1;
  overflow-y:auto; /* ❗ sadece burası scroll */
  margin-top:6px;
}

/* FOOT INPUT */
.bottom{
  display:flex;
  gap:6px;
  padding-top:6px;
  flex-shrink:0;
}

input,select{
  flex:1;
  padding:8px;
  border-radius:8px;
  border:none;
  background:#111827;
  color:#fff;
  font-size:12px;
}

button{
  background:#38bdf8;
  border:none;
  padding:0 12px;
  border-radius:8px;
  font-weight:bold;
}

/* 📱 SMALL SCREENS OPTIMIZATION */
@media (max-height:700px){
  .header h1{font-size:14px}
  .value{font-size:16px}
  .summary-card{padding:6px}
}
</style>
</head>

<body>

<div class="app-container">

  <div class="header">
    <h1>Sanofi Panel</h1>
    <p>Live Finance System</p>
  </div>

  <div class="live-status">
    <span>API</span>
    <span id="status">loading...</span>
  </div>

  <div class="nav-tabs">
    <button class="tab-btn active" onclick="tab('b')">Borç</button>
    <button class="tab-btn" onclick="tab('v')">Varlık</button>
  </div>

  <!-- BORC -->
  <div id="b" class="tab-content active">

    <div class="summary-card">
      <div class="label">Toplam</div>
      <div class="value">₺274.008</div>
    </div>

    <div class="summary-card">
      <div class="label">Ödenen</div>
      <div class="value" id="paid">₺0</div>
    </div>

    <div class="summary-card">
      <div class="label">Kalan</div>
      <div class="value" id="remain">₺0</div>
    </div>

    <div class="progress">
      <div class="progress-fill" id="bar"></div>
    </div>

    <div class="list" id="list"></div>

  </div>

  <!-- VARLIK -->
  <div id="v" class="tab-content">

    <div class="summary-card">
      <div class="label">Hisse</div>
      <input id="adet" value="92.8" oninput="calc()">
    </div>

    <div class="summary-card">
      <div class="label">EUR</div>
      <input id="hisse" oninput="calc()">
    </div>

    <div class="summary-card">
      <div class="label">Kur</div>
      <input id="kur" oninput="calc()">
    </div>

    <div class="summary-card">
      <div class="value" id="tl">₺0</div>
    </div>

  </div>

</div>

<script>

const API="/api/market";

let data=[
  {ay:"TEM",tutar:8000},
  {ay:"AĞU",tutar:10000}
];

function tab(x){
  document.querySelectorAll(".tab-content").forEach(e=>e.classList.remove("active"));
  document.getElementById(x).classList.add("active");
}

function render(){
  let paid=data.reduce((a,b)=>a+b.tutar,0);
  let total=274008;

  document.getElementById("paid").innerText="₺"+paid;
  document.getElementById("remain").innerText="₺"+(total-paid);
  document.getElementById("bar").style.width=(paid/total*100)+"%";

  let l=document.getElementById("list");
  l.innerHTML="";
  data.forEach(x=>{
    let d=document.createElement("div");
    d.innerHTML=x.ay+" - ₺"+x.tutar;
    d.style.padding="6px";
    d.style.borderBottom="1px solid #1e293b";
    l.appendChild(d);
  });
}

async function sync(){
  try{
    let r=await fetch(API);
    let d=await r.json();

    document.getElementById("hisse").value=d.sanofi||0;
    document.getElementById("kur").value=d.eurtry||0;

    document.getElementById("status").innerText="live";
    calc();
  }catch(e){
    document.getElementById("status").innerText="err";
  }
}

function calc(){
  let a=+adet.value;
  let h=+hisse.value;
  let k=+kur.value;
  tl.innerText="₺"+(a*h*k).toFixed(0);
}

render();
sync();
setInterval(sync,15000);

</script>

</body>
</html>
